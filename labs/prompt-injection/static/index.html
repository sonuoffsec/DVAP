<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>ARIA - Acme Corp Customer Support</title>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --bg: #0f1117;
      --surface: #1a1d27;
      --border: #2a2d3e;
      --primary: #4f6ef7;
      --primary-soft: #4f6ef720;
      --text: #e2e8f0;
      --muted: #64748b;
      --user-bg: #1e2a4a;
      --bot-bg: #1a1d27;
      --radius: 12px;
      --font: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
    }

    body {
      background: var(--bg);
      color: var(--text);
      font-family: var(--font);
      height: 100dvh;
      display: flex;
      flex-direction: column;
      overflow: hidden;
    }

    header {
      display: flex;
      align-items: center;
      gap: 12px;
      padding: 16px 24px;
      border-bottom: 1px solid var(--border);
      background: var(--surface);
      flex-shrink: 0;
    }

    .logo {
      width: 36px;
      height: 36px;
      background: var(--primary);
      border-radius: 8px;
      display: flex;
      align-items: center;
      justify-content: center;
      font-weight: 700;
      font-size: 14px;
      color: #fff;
      letter-spacing: 0.5px;
    }

    .header-text h1 { font-size: 15px; font-weight: 600; }
    .header-text p { font-size: 12px; color: var(--muted); }

    .status-dot {
      width: 7px;
      height: 7px;
      border-radius: 50%;
      background: #22c55e;
      margin-left: auto;
      box-shadow: 0 0 6px #22c55e80;
      animation: pulse 2s ease-in-out infinite;
    }

    @keyframes pulse {
      0%, 100% { opacity: 1; }
      50% { opacity: 0.4; }
    }

    #model-warning {
      background: #f59e0b18;
      border-bottom: 1px solid #f59e0b40;
      color: #f59e0b;
      font-size: 12px;
      padding: 8px 24px;
      display: none;
    }

    #messages {
      flex: 1;
      overflow-y: auto;
      padding: 24px;
      display: flex;
      flex-direction: column;
      gap: 16px;
      scroll-behavior: smooth;
    }

    #messages::-webkit-scrollbar { width: 4px; }
    #messages::-webkit-scrollbar-thumb { background: var(--border); border-radius: 4px; }

    .msg {
      display: flex;
      flex-direction: column;
      max-width: 75%;
      gap: 4px;
    }

    .msg.user { align-self: flex-end; align-items: flex-end; }
    .msg.assistant { align-self: flex-start; align-items: flex-start; }

    .msg-label {
      font-size: 11px;
      color: var(--muted);
      font-weight: 500;
      letter-spacing: 0.3px;
    }

    .msg-bubble {
      padding: 12px 16px;
      border-radius: var(--radius);
      font-size: 14px;
      line-height: 1.6;
      word-break: break-word;
      white-space: pre-wrap;
    }

    .msg.user .msg-bubble {
      background: var(--user-bg);
      border: 1px solid var(--primary)40;
      border-bottom-right-radius: 4px;
      color: var(--text);
    }

    .msg.assistant .msg-bubble {
      background: var(--bot-bg);
      border: 1px solid var(--border);
      border-bottom-left-radius: 4px;
    }

    .typing .msg-bubble { color: var(--muted); font-style: italic; }

    footer {
      padding: 16px 24px;
      border-top: 1px solid var(--border);
      background: var(--surface);
      display: flex;
      gap: 10px;
      flex-shrink: 0;
    }

    #input {
      flex: 1;
      background: var(--bg);
      border: 1px solid var(--border);
      border-radius: 8px;
      padding: 10px 14px;
      color: var(--text);
      font-size: 14px;
      font-family: var(--font);
      outline: none;
      transition: border-color 0.15s;
      resize: none;
      min-height: 44px;
      max-height: 120px;
    }

    #input:focus { border-color: var(--primary); }
    #input::placeholder { color: var(--muted); }

    button {
      background: var(--primary);
      color: #fff;
      border: none;
      border-radius: 8px;
      padding: 0 20px;
      font-size: 14px;
      font-weight: 500;
      cursor: pointer;
      transition: opacity 0.15s;
      white-space: nowrap;
      align-self: flex-end;
      height: 44px;
    }

    button:hover { opacity: 0.85; }
    button:disabled { opacity: 0.4; cursor: not-allowed; }

    .disclaimer {
      text-align: center;
      font-size: 11px;
      color: var(--muted);
      padding: 0 24px 12px;
      flex-shrink: 0;
    }
  </style>
</head>
<body>
  <header>
    <div class="logo">AC</div>
    <div class="header-text">
      <h1>ARIA</h1>
      <p>Acme Corp Customer Support</p>
    </div>
    <div class="status-dot" id="status-dot"></div>
  </header>

  <div id="model-warning">
    No model available. Go to <strong>Settings</strong> and pull a model (e.g. llama3.2:3b) to use this lab.
  </div>

  <div id="messages">
    <div class="msg assistant">
      <span class="msg-label">ARIA</span>
      <div class="msg-bubble">Hello! I'm ARIA, Acme Corp's AI-powered customer support assistant. How can I help you today?</div>
    </div>
  </div>

  <footer>
    <textarea id="input" placeholder="Type your message..." rows="1"></textarea>
    <button id="send-btn" onclick="sendMessage()">Send</button>
  </footer>
  <p class="disclaimer">Powered by Acme Corp AI &mdash; This is a secure, monitored support session</p>

  <script>
    const messagesEl = document.getElementById('messages');
    const inputEl = document.getElementById('input');
    const sendBtn = document.getElementById('send-btn');
    const warning = document.getElementById('model-warning');
    let history = [];
    let busy = false;

    async function checkModel() {
      try {
        const r = await fetch('/api/model');
        const d = await r.json();
        if (!d.available) warning.style.display = 'block';
      } catch {}
    }

    checkModel();

    inputEl.addEventListener('keydown', e => {
      if (e.key === 'Enter' && !e.shiftKey) { e.preventDefault(); sendMessage(); }
    });

    inputEl.addEventListener('input', () => {
      inputEl.style.height = 'auto';
      inputEl.style.height = Math.min(inputEl.scrollHeight, 120) + 'px';
    });

    function addMessage(role, content) {
      const wrapper = document.createElement('div');
      wrapper.className = `msg ${role}`;

      const label = document.createElement('span');
      label.className = 'msg-label';
      label.textContent = role === 'user' ? 'You' : 'ARIA';

      const bubble = document.createElement('div');
      bubble.className = 'msg-bubble';
      bubble.textContent = content;

      wrapper.appendChild(label);
      wrapper.appendChild(bubble);
      messagesEl.appendChild(wrapper);
      messagesEl.scrollTop = messagesEl.scrollHeight;
      return bubble;
    }

    async function sendMessage() {
      if (busy) return;
      const text = inputEl.value.trim();
      if (!text) return;

      inputEl.value = '';
      inputEl.style.height = 'auto';
      busy = true;
      sendBtn.disabled = true;

      addMessage('user', text);

      const typingWrapper = document.createElement('div');
      typingWrapper.className = 'msg assistant typing';
      typingWrapper.innerHTML = '<span class="msg-label">ARIA</span><div class="msg-bubble">Thinking...</div>';
      messagesEl.appendChild(typingWrapper);
      messagesEl.scrollTop = messagesEl.scrollHeight;

      try {
        const resp = await fetch('/chat', {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({ message: text, history }),
        });

        typingWrapper.remove();

        if (!resp.ok) {
          const err = await resp.json().catch(() => ({}));
          addMessage('assistant', err.detail || 'Sorry, something went wrong. Please try again.');
        } else {
          const data = await resp.json();
          addMessage('assistant', data.response);
          history.push({ role: 'user', content: text });
          history.push({ role: 'assistant', content: data.response });
          if (history.length > 20) history = history.slice(-20);
        }
      } catch (e) {
        typingWrapper.remove();
        addMessage('assistant', 'Connection error. The lab may be starting up — please try again.');
      }

      busy = false;
      sendBtn.disabled = false;
      inputEl.focus();
    }
  </script>
</body>
</html>
